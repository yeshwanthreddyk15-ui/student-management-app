{% extends 'base.html' %}
{% block content %}
  <h2>Registered Users</h2>
  <table class="table table-striped">
    <thead>
      <tr><th>ID</th><th>Username</th><th>Role</th></tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.username }}</td>
        <td>{{ u.role }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
