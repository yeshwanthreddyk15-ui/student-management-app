{% extends 'base.html' %}
{% block content %}
  <h2>Edit Marks for {{ student.name }}</h2>
  <form method="post">
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Subject</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody>
        {% for subject in subjects %}
        <tr>
          <td>{{ subject }}</td>
          <td>
            <input type="number" step="0.01" min="0" max="100" name="score_{{ subject.replace(' ', '_')|lower }}" class="form-control" value="{{ student.marks|selectattr('subject','equalto',subject)|map(attribute='score')|first or '' }}">
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <div class="mt-3">
      <button type="submit" class="btn btn-primary">Save Marks</button>
      <a href="{{ url_for('view_student', id=student.id) }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
{% endblock %}
