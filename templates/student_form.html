{% extends 'base.html' %}
{% block content %}
  <h2>{% if student %}Edit Student{% else %}Add New Student{% endif %}</h2>
  
  {% if student %}
    <form method="post" action="{{ url_for('edit_student', id=student.id) }}">
  {% else %}
    <form method="post" action="{{ url_for('new_student') }}">
  {% endif %}
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" name="name" class="form-control" value="{{ student.name if student else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" value="{{ student.email if student else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Course</label>
      <input type="text" name="course" class="form-control" value="{{ student.course if student else '' }}">
    </div>
    {% if not student %}
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
        <div class="form-text">Student username will be set to the entered name.</div>
      </div>
    {% endif %}
    <button class="btn btn-primary">Save</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
